<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>智能药盒 · 用药计划配置</title>
<style>
/* ===== CSS Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    --green:#6daa7e;--green-light:#e8f5e9;--green-dark:#4a8a5e;
    --cream:#fef9f0;--gray:#f0ece6;--gray-dark:#8c8c8c;
    --text:#3d3d3d;--text-light:#6b6b6b;--danger:#e07b7b;
    --card-shadow:0 2px 12px rgba(0,0,0,.06);
    --radius:16px;--radius-sm:10px;
}
html{font-size:16px}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--cream);color:var(--text);line-height:1.6;
    min-height:100vh;padding-bottom:120px;
}
/* ===== Header ===== */
.header{
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    color:#fff;padding:20px 16px;text-align:center;
    border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(109,170,126,.3);
}
.header h1{font-size:1.5rem;font-weight:600;letter-spacing:.5px}
.header p{font-size:.85rem;opacity:.85;margin-top:4px}
/* ===== Connection Bar ===== */
.conn-bar{
    display:flex;gap:8px;padding:12px 16px;background:#fff;
    margin:16px 12px 0;border-radius:var(--radius);box-shadow:var(--card-shadow);
    align-items:center;flex-wrap:wrap;
}
.conn-bar label{font-size:.8rem;color:var(--text-light);white-space:nowrap}
.conn-bar input{
    flex:1;min-width:120px;border:1.5px solid #e0dcd5;border-radius:var(--radius-sm);
    padding:10px 12px;font-size:.9rem;outline:none;transition:border-color .2s;
}
.conn-bar input:focus{border-color:var(--green)}
.conn-bar button{
    background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);
    padding:10px 16px;font-size:.85rem;cursor:pointer;white-space:nowrap;
    transition:background .2s;min-height:44px;
}
.conn-bar button:hover{background:var(--green-dark)}
.conn-status{font-size:.75rem;width:100%;text-align:center;margin-top:2px}
.conn-status.ok{color:var(--green-dark)}
.conn-status.err{color:var(--danger)}
/* ===== Section ===== */
.section{margin:16px 12px 0}
.section-title{
    font-size:1.05rem;font-weight:600;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
}
.section-title .icon{font-size:1.2rem}
/* ===== Master Switch ===== */
.master-switch-wrap{
    display:flex;align-items:center;justify-content:space-between;
    background:#fff;padding:14px 16px;border-radius:var(--radius);box-shadow:var(--card-shadow);
}
.master-switch-wrap .label{font-size:1rem;font-weight:500}
.toggle{
    position:relative;width:52px;height:30px;cursor:pointer;
}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:#ccc;border-radius:30px;transition:.3s;
}
.toggle input:checked+.slider{background:var(--green)}
.toggle .slider::before{
    content:"";position:absolute;width:24px;height:24px;
    left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;
}
.toggle input:checked+.slider::before{transform:translateX(22px)}
/* ===== Slot Grid ===== */
.slot-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;
}
.slot-card{
    background:#fff;border-radius:var(--radius);padding:14px;
    box-shadow:var(--card-shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;
    border:2px solid transparent;min-height:110px;
    position:relative;user-select:none;
}
.slot-card:active{transform:scale(.97)}
.slot-card.selected{border-color:var(--green);box-shadow:0 0 0 4px rgba(109,170,126,.15)}
.slot-card .slot-num{
    display:inline-block;background:var(--green-light);color:var(--green-dark);
    font-weight:700;font-size:.8rem;padding:3px 10px;border-radius:20px;
    margin-bottom:8px;
}
.slot-card .slot-num.empty{background:#f5f0eb;color:var(--gray-dark)}
.slot-card .slot-drug{font-size:.95rem;font-weight:600;margin-bottom:4px}
.slot-card .slot-drug.unset{color:#c5c0b8;font-weight:400}
.slot-card .slot-info{font-size:.75rem;color:var(--text-light)}
.slot-card .slot-badge{
    position:absolute;top:10px;right:10px;width:8px;height:8px;
    border-radius:50%;background:var(--green);
}
.slot-card .slot-badge.off{background:#ddd}
/* ===== Editor Panel ===== */
.editor-overlay{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.35);z-index:100;justify-content:center;align-items:flex-end;
}
.editor-overlay.active{display:flex}
.editor-panel{
    background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:520px;
    max-height:85vh;overflow-y:auto;padding:20px 16px 32px;
    animation:slideUp .25s ease-out;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.editor-panel h3{font-size:1.2rem;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:14px}
.form-group label{
    display:block;font-size:.85rem;font-weight:500;color:var(--text-light);margin-bottom:4px;
}
.form-group input,.form-group select{
    width:100%;border:1.5px solid #e0dcd5;border-radius:var(--radius-sm);
    padding:12px;font-size:1rem;outline:none;transition:border-color .2s;
    -webkit-appearance:none;
}
.form-group input:focus,.form-group select:focus{border-color:var(--green)}
.dose-stepper{
    display:flex;align-items:center;gap:8px;
}
.dose-stepper button{
    width:44px;height:44px;border:1.5px solid #e0dcd5;border-radius:50%;
    background:#fff;font-size:1.3rem;cursor:pointer;display:flex;
    align-items:center;justify-content:center;transition:all .15s;
}
.dose-stepper button:active{background:var(--green-light);border-color:var(--green)}
.dose-stepper .dose-val{font-size:1.4rem;font-weight:700;min-width:36px;text-align:center}
/* ===== Time Pickers ===== */
.time-picker-row{
    display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.time-picker-row .time-label{font-size:.8rem;color:var(--text-light);min-width:32px}
.time-picker-row select{
    flex:1;border:1.5px solid #e0dcd5;border-radius:var(--radius-sm);
    padding:8px;font-size:.9rem;text-align:center;
}
.template-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.template-btns button{
    background:var(--gray);border:none;border-radius:20px;padding:6px 14px;
    font-size:.75rem;cursor:pointer;transition:background .15s;
}
.template-btns button:active{background:var(--green-light)}
/* ===== Editor Actions ===== */
.editor-actions{
    display:flex;gap:10px;margin-top:20px;
}
.editor-actions button{
    flex:1;padding:14px;border:none;border-radius:var(--radius-sm);
    font-size:1rem;font-weight:600;cursor:pointer;min-height:48px;
    transition:background .2s;
}
.btn-clear{background:var(--gray);color:var(--text)}
.btn-save{background:var(--green);color:#fff}
.btn-close{background:transparent;color:var(--text-light);font-weight:400}
/* ===== Timeline ===== */
.timeline{padding-left:20px;border-left:2px solid #e0dcd5}
.timeline-item{
    position:relative;margin-bottom:14px;padding-left:20px;
    background:#fff;border-radius:var(--radius-sm);padding:12px 14px;
    box-shadow:var(--card-shadow);
}
.timeline-item::before{
    content:"";position:absolute;left:-27px;top:16px;
    width:10px;height:10px;border-radius:50%;background:var(--green);
    border:2px solid #fff;
}
.timeline-item .tl-time{font-size:.8rem;color:var(--green-dark);font-weight:600}
.timeline-item .tl-drug{font-size:.95rem;font-weight:600;margin:2px 0}
.timeline-item .tl-dose{font-size:.8rem;color:var(--text-light)}
.timeline-item .tl-slot{font-size:.7rem;color:var(--gray-dark)}
.empty-state{
    text-align:center;padding:30px;color:var(--gray-dark);font-size:.9rem;
}
/* ===== Global Actions ===== */
.global-actions{
    position:fixed;bottom:0;left:0;right:0;background:#fff;
    padding:14px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.08);
    display:flex;gap:10px;z-index:50;
}
.global-actions button{
    flex:1;padding:14px;border:none;border-radius:var(--radius-sm);
    font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;
    transition:all .2s;
}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:active{background:var(--green-dark)}
.btn-secondary{background:var(--gray);color:var(--text)}
.btn-secondary:active{background:#e0ddd5}
/* Toast */
.toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:var(--text);color:#fff;padding:12px 24px;border-radius:24px;
    font-size:.85rem;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1}
.toast.success{background:var(--green-dark)}
.toast.error{background:var(--danger)}
/* ===== Tablet+ ===== */
@media(min-width:768px){
    .slot-grid{grid-template-columns:repeat(4,1fr)}
    .editor-overlay{align-items:center}
    .editor-panel{border-radius:24px;max-height:90vh}
    .conn-bar,.section{margin-left:auto;margin-right:auto;max-width:700px}
    .header{border-radius:0 0 32px 32px}
    .global-actions{max-width:700px;left:50%;transform:translateX(-50%);border-radius:var(--radius) var(--radius) 0 0}
}
@media(min-width:1024px){
    .slot-grid{grid-template-columns:repeat(7,1fr)}
    .conn-bar,.section{max-width:900px}
    .global-actions{max-width:900px}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
    <h1>智能药盒</h1>
    <p>用药计划配置 · 移动端管理</p>
</header>

<!-- Connection Bar -->
<div class="conn-bar" id="connBar">
    <label>设备地址:</label>
    <input type="text" id="deviceIp" placeholder="192.168.x.x" inputmode="url">
    <button onclick="testConnection()">连接</button>
    <div class="conn-status" id="connStatus"></div>
</div>

<!-- Master Switch -->
<div class="section">
    <div class="section-title"><span class="icon"></span>提醒控制</div>
    <div class="master-switch-wrap">
        <span class="label">用药提醒总开关</span>
        <label class="toggle">
            <input type="checkbox" id="masterEnabled" onchange="onMasterToggle()">
            <span class="slider"></span>
        </label>
    </div>
</div>

<!-- Slot Cards -->
<div class="section">
    <div class="section-title"><span class="icon"></span>药槽配置 (点击槽位编辑)</div>
    <div class="slot-grid" id="slotGrid"></div>
</div>

<!-- Today's Timeline -->
<div class="section">
    <div class="section-title"><span class="icon"></span>今日提醒时间轴</div>
    <div id="timeline" class="empty-state">暂无提醒计划，请配置药槽</div>
</div>

<!-- Editor Overlay -->
<div class="editor-overlay" id="editorOverlay">
    <div class="editor-panel" id="editorPanel"></div>
</div>

<!-- Global Actions -->
<div class="global-actions">
    <button class="btn-secondary" onclick="loadFromDevice()">从设备读取</button>
    <button class="btn-secondary" onclick="resetAll()">清空</button>
    <button class="btn-primary" onclick="saveToDevice()">保存并下发</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== Data Model =====
const DEFAULT_PLAN = {
    master_enabled: true,
    slots: Array.from({length:7}, (_,i)=>({
        slot: i+1,
        drug_name: "",
        shape_label: "",
        dose_count: 1,
        daily_frequency: 0,
        times: []
    }))
};

const TIME_TEMPLATES = {
    "早中晚": [{h:8,m:0},{h:12,m:30},{h:19,m:0}],
    "早晚": [{h:8,m:0},{h:20,m:0}],
    "早中晚睡前": [{h:8,m:0},{h:12,m:30},{h:18,m:0},{h:22,m:0}],
    "每日一次早": [{h:8,m:0}],
    "每日一次晚": [{h:20,m:0}]
};

const SHAPE_OPTIONS = ["","圆形药片","胶囊"," oval ","三角形","心形","白色","黄色","红色","蓝色","绿色"];

let currentPlan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
let deviceBaseUrl = "";

// Load from localStorage
function loadCache() {
    const cached = localStorage.getItem("med_plan");
    if (cached) {
        try {
            const parsed = JSON.parse(cached);
            if (parsed.slots && parsed.slots.length === 7) {
                currentPlan = parsed;
            }
        } catch(e) {}
    }
    const ip = localStorage.getItem("med_device_ip");
    if (ip) document.getElementById("deviceIp").value = ip;
}
loadCache();

function saveCache() {
    localStorage.setItem("med_plan", JSON.stringify(currentPlan));
}
function saveIpCache(ip) {
    localStorage.setItem("med_device_ip", ip);
}

// ===== Render =====
const timeLabels = ["","①","②","③","④","⑤"];

function renderAll() {
    document.getElementById("masterEnabled").checked = currentPlan.master_enabled;
    renderSlots();
    renderTimeline();
    saveCache();
}

function renderSlots() {
    const grid = document.getElementById("slotGrid");
    grid.innerHTML = "";
    currentPlan.slots.forEach((s,i) => {
        const card = document.createElement("div");
        card.className = "slot-card";
        card.onclick = ()=>openEditor(i);

        const configured = s.drug_name && s.daily_frequency > 0;
        card.innerHTML = `
            <span class="slot-num ${configured?'':'empty'}">槽 ${s.slot}</span>
            <span class="slot-badge ${configured?'':'off'}"></span>
            <div class="slot-drug ${configured?'':'unset'}">${configured ? s.drug_name : '未配置'}</div>
            <div class="slot-info">${configured ? `${s.dose_count}颗 · ${s.daily_frequency}次/日` : '点击配置'}</div>
        `;
        grid.appendChild(card);
    });
}

function renderTimeline() {
    const tl = document.getElementById("timeline");
    if (!currentPlan.master_enabled) {
        tl.innerHTML = '<div class="empty-state">提醒总开关已关闭</div>';
        return;
    }

    let entries = [];
    currentPlan.slots.forEach(s => {
        if (!s.drug_name || s.daily_frequency === 0) return;
        s.times.forEach(t => {
            entries.push({
                slot: s.slot,
                drug: s.drug_name,
                dose: s.dose_count,
                hour: t.h,
                minute: t.m,
                minutes: t.h * 60 + t.m
            });
        });
    });

    if (entries.length === 0) {
        tl.innerHTML = '<div class="empty-state">暂无提醒计划，请配置药槽</div>';
        return;
    }

    entries.sort((a,b)=>a.minutes - b.minutes);

    tl.innerHTML = entries.map((e,i)=>{
        const hh = String(e.hour).padStart(2,'0');
        const mm = String(e.minute).padStart(2,'0');
        return `<div class="timeline-item">
            <div class="tl-time">${hh}:${mm}</div>
            <div class="tl-drug">${e.drug} <span class="tl-slot">[槽${e.slot}]</span></div>
            <div class="tl-dose">每次 ${e.dose} 颗</div>
        </div>`;
    }).join("");
}

// ===== Editor =====
let editingSlot = -1;

function openEditor(slotIdx) {
    editingSlot = slotIdx;
    const s = currentPlan.slots[slotIdx];
    const overlay = document.getElementById("editorOverlay");
    const panel = document.getElementById("editorPanel");

    let timeRows = "";
    for (let i = 0; i < 5; i++) {
        const h = (s.times[i] || {}).h || 8;
        const m = (s.times[i] || {}).m || 0;
        const visible = i < s.daily_frequency ? "" : "style='display:none'";
        timeRows += `<div class="time-picker-row" id="timeRow${i}" ${visible}>
            <span class="time-label">时间${timeLabels[i]}</span>
            <select id="editHour${i}" onchange="onTimeChange()">${hourOptions(h)}</select>
            <span>:</span>
            <select id="editMin${i}" onchange="onTimeChange()">${minOptions(m)}</select>
        </div>`;
    }

    const shapeOptions = SHAPE_OPTIONS.map(o=>`<option value="${o}" ${o===s.shape_label?'selected':''}>${o||'无标签'}</option>`).join("");

    panel.innerHTML = `
        <h3>编辑药槽 ${s.slot}</h3>
        <div class="form-group">
            <label>药品名称</label>
            <input type="text" id="editDrugName" value="${escapeHtml(s.drug_name)}" placeholder="例如：降压药" oninput="onFieldChange()">
        </div>
        <div class="form-group">
            <label>形状/颜色标签</label>
            <select id="editShape">${shapeOptions}</select>
        </div>
        <div class="form-group">
            <label>单次服用颗数</label>
            <div class="dose-stepper">
                <button onclick="stepDose(-1)">−</button>
                <span class="dose-val" id="doseDisplay">${s.dose_count}</span>
                <button onclick="stepDose(1)">+</button>
            </div>
        </div>
        <div class="form-group">
            <label>每日服用次数</label>
            <select id="editFreq" onchange="onFreqChange()">
                <option value="0" ${s.daily_frequency===0?'selected':''}>未设置</option>
                <option value="1" ${s.daily_frequency===1?'selected':''}>每日 1 次</option>
                <option value="2" ${s.daily_frequency===2?'selected':''}>每日 2 次</option>
                <option value="3" ${s.daily_frequency===3?'selected':''}>每日 3 次</option>
                <option value="4" ${s.daily_frequency===4?'selected':''}>每日 4 次</option>
                <option value="5" ${s.daily_frequency===5?'selected':''}>每日 5 次</option>
            </select>
        </div>
        <div class="form-group">
            <label>提醒时间</label>
            ${timeRows}
            <div class="template-btns">
                <span style="font-size:.75rem;color:var(--text-light);line-height:28px;">模板:</span>
                ${Object.keys(TIME_TEMPLATES).map(t=>`<button onclick="applyTemplate('${t}')">${t}</button>`).join("")}
            </div>
        </div>
        <div class="editor-actions">
            <button class="btn-clear" onclick="clearSlot()">清空此槽</button>
            <button class="btn-save" onclick="closeEditor()">确定</button>
        </div>
    `;

    overlay.classList.add("active");

    // Highlight card
    document.querySelectorAll(".slot-card").forEach((c,i)=>c.classList.toggle("selected",i===slotIdx));
}

function closeEditor() {
    // Save editor state to model
    const s = currentPlan.slots[editingSlot];
    s.drug_name = document.getElementById("editDrugName").value.trim();
    s.shape_label = document.getElementById("editShape").value;
    s.daily_frequency = parseInt(document.getElementById("editFreq").value);

    s.times = [];
    for (let i = 0; i < s.daily_frequency; i++) {
        const h = parseInt(document.getElementById(`editHour${i}`).value);
        const m = parseInt(document.getElementById(`editMin${i}`).value);
        s.times.push({h, m});
    }

    document.getElementById("editorOverlay").classList.remove("active");
    document.querySelectorAll(".slot-card").forEach(c=>c.classList.remove("selected"));
    editingSlot = -1;
    renderAll();
}

function clearSlot() {
    const s = currentPlan.slots[editingSlot];
    s.drug_name = "";
    s.shape_label = "";
    s.daily_frequency = 0;
    s.times = [];
    closeEditor();
}

function onFreqChange() {
    const freq = parseInt(document.getElementById("editFreq").value);
    for (let i = 0; i < 5; i++) {
        const row = document.getElementById(`timeRow${i}`);
        if (row) row.style.display = i < freq ? "flex" : "none";
    }
}

function onTimeChange() {}
function onFieldChange() {}

function stepDose(delta) {
    const s = currentPlan.slots[editingSlot];
    s.dose_count = Math.max(1, Math.min(9, s.dose_count + delta));
    document.getElementById("doseDisplay").textContent = s.dose_count;
    saveCache();
}

function applyTemplate(name) {
    const tpl = TIME_TEMPLATES[name];
    const freq = tpl.length;
    document.getElementById("editFreq").value = freq;
    onFreqChange();
    tpl.forEach((t,i) => {
        const hEl = document.getElementById(`editHour${i}`);
        const mEl = document.getElementById(`editMin${i}`);
        if (hEl) hEl.value = t.h;
        if (mEl) mEl.value = t.m;
    });
}

function hourOptions(sel) {
    let s = "";
    for (let h = 0; h < 24; h++) {
        const hh = String(h).padStart(2,'0');
        s += `<option value="${h}" ${h===sel?'selected':''}>${hh}</option>`;
    }
    return s;
}
function minOptions(sel) {
    let s = "";
    for (let m = 0; m < 60; m += 5) {
        const mm = String(m).padStart(2,'0');
        s += `<option value="${m}" ${m===sel?'selected':''}>${mm}</option>`;
    }
    return s;
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

// ===== Master Toggle =====
function onMasterToggle() {
    currentPlan.master_enabled = document.getElementById("masterEnabled").checked;
    saveCache();
    renderTimeline();
}

// ===== Device Communication =====
function getDeviceUrl() {
    const ip = document.getElementById("deviceIp").value.trim();
    if (!ip) return null;
    saveIpCache(ip);
    return `http://${ip}`;
}

async function testConnection() {
    const base = getDeviceUrl();
    if (!base) { showToast("请输入设备IP地址", "error"); return; }
    deviceBaseUrl = base;
    const statusEl = document.getElementById("connStatus");
    statusEl.textContent = "连接中...";
    try {
        const resp = await fetch(`${base}/api/health`, {signal: AbortSignal.timeout(3000)});
        if (resp.ok) {
            statusEl.textContent = "已连接"; statusEl.className = "conn-status ok";
            showToast("连接成功","success");
        } else {
            throw new Error("not ok");
        }
    } catch(e) {
        statusEl.textContent = "连接失败，请检查IP";
        statusEl.className = "conn-status err";
        showToast("无法连接设备，请检查地址","error");
    }
}

function buildPlanJson() {
    const plan = JSON.parse(JSON.stringify(currentPlan));
    plan.slots.forEach(s => {
        // Convert {h,m} back to {hour,minute} for C++ parser
        s.times = s.times.map(t=>({hour:t.h, minute:t.m}));
    });
    return JSON.stringify(plan);
}

async function saveToDevice() {
    const base = getDeviceUrl();
    if (!base) { showToast("请输入设备IP地址","error"); return; }
    deviceBaseUrl = base;

    const json = buildPlanJson();

    try {
        const resp = await fetch(`${base}/api/medicine/plan`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: json,
            signal: AbortSignal.timeout(5000)
        });
        if (resp.ok) {
            const statusEl = document.getElementById("connStatus");
            statusEl.textContent = "已连接"; statusEl.className = "conn-status ok";
            showToast("计划已保存并下发到设备","success");
            return;
        }
        showToast("保存失败: " + await resp.text(),"error");
    } catch(e) {
        showToast("无法连接设备，请确认IP地址和设备在线","error");
        document.getElementById("connStatus").textContent = "连接失败";
        document.getElementById("connStatus").className = "conn-status err";
    }
}

async function loadFromDevice() {
    const base = getDeviceUrl();
    if (!base) { showToast("请输入设备IP地址","error"); return; }
    deviceBaseUrl = base;

    try {
        const resp = await fetch(`${base}/api/medicine/plan`, {
            signal: AbortSignal.timeout(5000)
        });
        if (resp.ok) {
            const plan = await resp.json();
            if (plan.slots) {
                plan.slots.forEach(s => {
                    s.daily_frequency = s.daily_frequency || 0;
                    s.times = (s.times||[]).map(t=>({h:t.hour??t.h??8, m:t.minute??t.m??0}));
                    if (!s.dose_count) s.dose_count = 1;
                });
                plan.master_enabled = !!plan.master_enabled;
                currentPlan = plan;
                renderAll();
                document.getElementById("connStatus").textContent = "已连接";
                document.getElementById("connStatus").className = "conn-status ok";
                showToast("已从设备读取计划","success");
                return;
            }
        }
        showToast("设备返回数据格式异常","error");
    } catch(e) {
        showToast("无法从设备读取，请确认连接","error");
    }
}

function resetAll() {
    if (!confirm("确定要清空所有药槽配置吗？此操作不可撤销。")) return;
    currentPlan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
    renderAll();
    showToast("已清空所有配置");
}

// ===== Toast =====
let toastTimer;
function showToast(msg, type) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast " + (type||"") + " show";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.classList.remove("show"), 2500);
}

// ===== Close editor on overlay click =====
document.getElementById("editorOverlay").addEventListener("click", function(e) {
    if (e.target === this) closeEditor();
});

// ===== Init =====
renderAll();
</script>
